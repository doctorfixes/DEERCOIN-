<body>
    <div class="redirect-box">
        <p>Redirecting to $RACK in</p>
        <div class="countdown" id="countdown">3</div>
        <!-- TODO: replace https://pump.fun/your-token-link with your actual Pump.fun token URL -->
        <a href="https://pump.fun/your-token-link">Click here if it doesn't happen automatically</a>
    </div>
    <script>
        (function () {
            var DEST = 'https://pump.fun/your-token-link'; // TODO: update this URL
            var el = document.getElementById('countdown');
            var count = 3;
            var timer = setInterval(function () {
                count -= 1;
                el.textContent = count;
                if (count <= 0) {
                    clearInterval(timer);
                    window.location.href = DEST;
                }
            }, 1000);
        }());
    </script>
